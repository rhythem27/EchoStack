version: '3.8'

services:
  # --- PostgreSQL + pgvector Database (Limited to 1.0GB RAM) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: echostack-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-echostack_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 1000M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres_user} -d $${POSTGRES_DB:-echostack_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - echostack-network

  # --- Redis Caching & Rate Limiting (Limited to 512MB RAM) ---
  redis:
    image: redis:7-alpine
    container_name: echostack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - echostack-network

  # --- Apache Kafka with KRaft - No ZooKeeper (Limited to 1.0GB RAM) ---
  kafka:
    image: bitnami/kafka:3.5.0
    container_name: echostack-kafka
    ports:
      - "9092:9092"
    environment:
      # Enable KRaft mode
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Listener configs
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Single-node configuration optimizations
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
    deploy:
      resources:
        limits:
          memory: 1000M
    healthcheck:
      test: ["CMD", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echostack-network

  # --- FastAPI Core Ingress & WebSocket Audio Proxy (Limited to 1.5GB RAM + RTX GPU Access) ---
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echostack-fastapi-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres_user}:${POSTGRES_PASSWORD:-postgres_secure_password}@postgres:5432/${POSTGRES_DB:-echostack_db}
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - echostack-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  echostack-network:
    driver: bridge
